<div class="modal-overlay" (click)="fecharModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2>Pagamento</h2>
        <p class="servico-nome">{{ nomeServico }}</p>
      </div>
      <div class="valor-badge">R$ {{ valor.toFixed(2) }}</div>
      <button class="close-btn" (click)="fecharModal()">✕</button>
    </div>

    <div class="etapa">
      <p class="label-section">Seus dados para pagamento</p>

      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" [(ngModel)]="pagadorNome" placeholder="João da Silva" />
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" [(ngModel)]="pagadorEmail" placeholder="joao@email.com" />
      </div>

      <div class="metodos-info">
        <span>💠 Pix</span>
        <span>💳 Crédito</span>
        <span>🏦 Débito</span>
        <span>📄 Boleto</span>
      </div>

      <p class="mp-info">
        Você será redirecionado para o site do
        <strong>Mercado Pago</strong> para escolher a forma de pagamento e concluir com segurança.
      </p>

      <button class="pay-btn mp" (click)="iniciarPagamento()" [disabled]="carregando">
        <span *ngIf="!carregando"> Ir para o Mercado Pago → </span>
        <span *ngIf="carregando" class="spinner"></span>
      </button>
      
    </div>
  </div>
</div>
