<div class="page">

  <aside class="sidebar">

    <div class="logo">

      <div class="logo-icon">
        📅
      </div>

      <h2>AgendaPro</h2>

    </div>

    <nav>

      <a class="active">
        Serviços
      </a>

      <a routerLink="/agendamentos">
        Agendamentos
      </a>

    </nav>

  </aside>


  <main class="content">

    <!-- TOP -->

    <div class="topbar">

      <div>

        <h1>
          Serviços
        </h1>

        <p>
          Gerencie seus serviços e horários.
        </p>

      </div>

      <button class="new-button">
        + Novo serviço
      </button>

    </div>

    <!-- FORM -->

    <div class="form-card">

      <h2>
        Criar serviço
      </h2>

      <div class="form-grid">

        <input
          type="text"
          placeholder="Nome do serviço"
          [(ngModel)]="servico.nome"
        />

        <input
          type="number"
          placeholder="Preço"
          [(ngModel)]="servico.preco"
        />

        <input
          type="number"
          placeholder="Duração em minutos"
          [(ngModel)]="servico.duracaoMinutos"
        />

      </div>

      <button
        class="save-button"
        (click)="salvar()"
      >
        Salvar serviço
      </button>

    </div>

    <!-- LIST -->

    <div class="services-grid">

      <div
        class="service-card"
        *ngFor="let item of servicos"
      >

        <div class="service-header">

          <div class="service-icon">
            ✂️
          </div>

          <div>

            <h3>
              {{ item.nome }}
            </h3>

            <span>
              {{ item.duracaoMinutos }} minutos
            </span>

          </div>

        </div>

        <div class="price">

          R$ {{ item.preco }}

        </div>

        <button class="details-button">
          Ver detalhes
        </button>

      </div>
    </div>
  </main>
</div>
